# ─── Free PostgreSQL Database (Render Managed) ───
# Render automatically creates a free PostgreSQL database and injects DATABASE_URL
# ─── Free PostgreSQL Database (Render Managed) ───
databases:
  - name: spice-garden-db
    databaseName: spice_garden
    region: singapore
    plan: free

services:
  - type: web
    name: spice-garden
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: spice-garden-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
